<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>대시보드 | 시설물 자산/작업지시 관리 POC</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <button id="menuToggle" class="menu-toggle" type="button">☰</button>
      <a class="brand" href="dashboard.html">시설물 자산/작업지시 관리</a>
      <span class="header-spacer"></span>
      <span id="loginUserName" class="login-user"></span>
      <button id="clearStorageBtn" class="btn btn-ghost" type="button">초기화</button>
      <button id="logoutBtn" class="btn btn-ghost" type="button">로그아웃</button>
    </header>
    <aside id="sidebar" class="sidebar">
      <nav class="side-nav">
        <a href="dashboard.html" data-page="dashboard">대시보드</a>
        <a href="assets.html" data-page="assets">자산 관리</a>
        <a href="work-orders.html" data-page="work-orders">작업지시</a>
        <a href="import.html" data-page="import">CSV Import</a>
      </nav>
    </aside>
    <main class="content">
      <div class="page-title">
        <h1>대시보드</h1>
        <p>자산 상태와 작업지시 진행 현황을 요약합니다.</p>
      </div>
      <section class="grid grid-4">
        <div class="summary-card"><span>전체 자산</span><strong id="totalAssets">0</strong></div>
        <div class="summary-card status-filter" data-status="NORMAL"><span>정상</span><strong id="normalAssets">0</strong></div>
        <div class="summary-card status-filter" data-status="INSPECTION"><span>점검중</span><strong id="inspectionAssets">0</strong></div>
        <div class="summary-card status-filter" data-status="BROKEN"><span>고장</span><strong id="brokenAssets">0</strong></div>
      </section>
      <section class="grid grid-4 section-gap-sm">
        <div class="summary-card status-filter" data-status="DISPOSED"><span>폐기</span><strong id="disposedAssets">0</strong></div>
        <div class="summary-card"><span>접수 작업</span><strong id="openWorkOrders">0</strong></div>
        <div class="summary-card"><span>진행 작업</span><strong id="progressWorkOrders">0</strong></div>
        <div class="summary-card"><span>완료 작업</span><strong id="doneWorkOrders">0</strong></div>
      </section>
      <section class="grid grid-2 section-gap">
        <div class="panel"><h2 class="panel-title">자산 상태</h2><div id="assetStatusChart"></div></div>
        <div class="panel"><h2 class="panel-title">작업지시 상태</h2><div id="workStatusChart"></div></div>
      </section>
      <section class="panel">
        <h2 class="panel-title">최근 작업지시 5건</h2>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>제목</th><th>자산</th><th>우선순위</th><th>상태</th><th>요청일</th></tr></thead>
            <tbody id="recentWorkOrders"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="vendor/jquery-3.7.1.min.js"></script>
  <script src="js/storage.js"></script><script src="js/api.js"></script><script src="js/app.js?v=20260623"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
