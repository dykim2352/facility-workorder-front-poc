<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>자산 상세 | 시설물 자산/작업지시 관리 POC</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <button id="menuToggle" class="menu-toggle" type="button">☰</button>
      <a class="brand" href="dashboard.html">시설물 자산/작업지시 관리</a>
      <span class="header-spacer"></span>
      <span id="loginUserName" class="login-user"></span>
      <button id="clearStorageBtn" class="btn btn-ghost" type="button">초기화</button>
      <button id="logoutBtn" class="btn btn-ghost" type="button">로그아웃</button>
    </header>
    <aside id="sidebar" class="sidebar">
      <nav class="side-nav">
        <a href="dashboard.html" data-page="dashboard">대시보드</a>
        <a href="assets.html" data-page="assets">자산 관리</a>
        <a href="work-orders.html" data-page="work-orders">작업지시</a>
        <a href="import.html" data-page="import">CSV Import</a>
      </nav>
    </aside>
    <main class="content">
      <div class="page-title"><h1 id="detailTitle">자산 상세</h1><p id="detailDescription"></p></div>
      <div class="actions actions-left">
        <button id="backBtn" class="btn" type="button">목록</button>
        <select id="assetStatusSelect" class="btn">
          <option value="NORMAL">정상</option>
          <option value="INSPECTION">점검중</option>
          <option value="BROKEN">고장</option>
          <option value="DISPOSED">폐기</option>
        </select>
        <button id="changeStatusBtn" class="btn btn-primary" type="button">상태 변경</button>
      </div>
      <div id="detailArea"></div>
      <section class="panel">
        <h2 class="panel-title">관련 작업지시</h2>
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>제목</th><th>우선순위</th><th>상태</th><th>담당자</th><th>요청일</th></tr></thead>
            <tbody id="relatedWorkOrders"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="vendor/jquery-3.7.1.min.js"></script>
  <script src="js/storage.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
  <script src="js/asset-detail.js"></script>
</body>
</html>
