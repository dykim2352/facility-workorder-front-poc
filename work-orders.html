<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>작업지시 | 시설물 자산/작업지시 관리 POC</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <button id="menuToggle" class="menu-toggle" type="button">☰</button>
      <a class="brand" href="dashboard.html">시설물 자산/작업지시 관리</a>
      <span class="header-spacer"></span>
      <span id="loginUserName" class="login-user"></span>
      <button id="clearStorageBtn" class="btn btn-ghost" type="button">초기화</button>
      <button id="logoutBtn" class="btn btn-ghost" type="button">로그아웃</button>
    </header>
    <aside id="sidebar" class="sidebar">
      <nav class="side-nav">
        <a href="dashboard.html" data-page="dashboard">대시보드</a>
        <a href="assets.html" data-page="assets">자산 관리</a>
        <a href="work-orders.html" data-page="work-orders">작업지시</a>
        <a href="import.html" data-page="import">CSV Import</a>
      </nav>
    </aside>
    <main class="content">
      <div class="page-title"><h1>작업지시</h1><p>작업지시를 검색하고 상태 흐름을 변경합니다.</p></div>
      <section class="panel">
        <form id="woSearchForm" class="form-grid">
          <div class="form-field"><label>상태</label><select id="woStatus">
            <option value="">전체</option><option value="OPEN">접수</option>
            <option value="ASSIGNED">배정</option><option value="IN_PROGRESS">진행중</option>
            <option value="DONE">완료</option><option value="CANCELED">취소</option></select>
          </div>
          <div class="form-field"><label>우선순위</label><select id="woPriority">
            <option value="">전체</option><option value="LOW">낮음</option><option value="MEDIUM">보통</option>
            <option value="HIGH">높음</option><option value="URGENT">긴급</option></select>
          </div>
          <div class="form-field"><label>자산명</label><input id="woAssetName"></div>
          <div class="form-field"><label>담당자</label><input id="woAssignee"></div>
        </form>
        <div class="actions">
          <button id="woResetBtn" class="btn" type="button">초기화</button>
          <button id="woSearchBtn" class="btn btn-primary" type="button">검색</button>
          <button id="addWorkOrderBtn" class="btn btn-primary" type="button">작업지시 등록</button>
        </div>
      </section>
      <section class="panel">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>제목</th><th>자산</th><th>우선순위</th><th>상태</th><th>담당자</th><th>요청일</th><th>관리</th></tr></thead>
            <tbody id="workOrderTableBody"></tbody>
          </table>
        </div>
        <div id="workOrderPagination" class="pagination"></div>
      </section>
    </main>
  </div>
  <div id="workOrderModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header"><h2>작업지시 등록</h2><button class="btn" type="button" data-modal-close>닫기</button></div>
      <form id="workOrderForm">
        <div class="modal-body form-grid">
          <div class="form-field"><label>자산</label><select id="woAssetId" name="assetId"></select><span class="field-error"></span></div>
          <div class="form-field"><label>제목</label><input name="title"><span class="field-error"></span></div>
          <div class="form-field"><label>우선순위</label><select name="priority">
            <option value="LOW">낮음</option><option value="MEDIUM">보통</option>
            <option value="HIGH">높음</option><option value="URGENT">긴급</option></select>
            <span class="field-error"></span>
          </div>
          <div class="form-field"><label>상태</label><select name="status">
            <option value="OPEN">접수</option><option value="ASSIGNED">배정</option>
            <option value="IN_PROGRESS">진행중</option></select>
            <span class="field-error"></span>
          </div>
          <div class="form-field"><label>담당자</label><input name="assignee"></div>
          <div class="form-field"><label>요청일</label><input id="woRequestedAt" name="requestedAt" type="datetime-local"><span class="field-error"></span></div>
          <div class="form-field form-field-full"><label>설명</label><textarea name="description"></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn" type="button" data-modal-close>취소</button>
          <button class="btn btn-primary" type="submit">저장</button>
        </div>
      </form>
    </div>
  </div>
  <div id="historyModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header"><h2 id="historyModalTitle">상태 변경 이력</h2><button class="btn" type="button" data-modal-close>닫기</button></div>
      <div class="modal-body">
        <div class="table-wrap">
          <table class="data-table">
            <thead><tr><th>변경 전</th><th>변경 후</th><th>변경일시</th></tr></thead>
            <tbody id="historyTableBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer"><button class="btn" type="button" data-modal-close>닫기</button></div>
    </div>
  </div>
  <script src="vendor/jquery-3.7.1.min.js"></script>
  <script src="js/storage.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
  <script src="js/validation.js"></script><script src="js/modal.js"></script><script src="js/table.js"></script>
  <script src="js/work-orders.js"></script>
</body>
</html>
