<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>자산 관리 | 시설물 자산/작업지시 관리 POC</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-header">
      <button id="menuToggle" class="menu-toggle" type="button">☰</button>
      <a class="brand" href="dashboard.html">시설물 자산/작업지시 관리</a>
      <span class="header-spacer"></span>
      <span id="loginUserName" class="login-user"></span>
      <button id="clearStorageBtn" class="btn btn-ghost" type="button">초기화</button>
      <button id="logoutBtn" class="btn btn-ghost" type="button">로그아웃</button></header>
    <aside id="sidebar" class="sidebar">
      <nav class="side-nav">
        <a href="dashboard.html" data-page="dashboard">대시보드</a>
        <a href="assets.html" data-page="assets">자산 관리</a>
        <a href="work-orders.html" data-page="work-orders">작업지시</a>
        <a href="import.html" data-page="import">CSV Import</a>
      </nav>
    </aside>
    <main class="content">
      <div class="page-title"><h1>자산 관리</h1><p>시설물 자산을 검색, 등록, 수정, 삭제합니다.</p></div>
      <section class="panel">
        <form id="searchForm" class="form-grid">
          <div class="form-field"><label for="assetName">자산명</label><input id="assetName"></div>
          <div class="form-field"><label for="assetCode">자산코드</label><input id="assetCode"></div>
          <div class="form-field"><label for="assetType">자산유형</label><input id="assetType"></div>
          <div class="form-field">
            <label for="status">상태</label>
            <select id="status">
              <option value="">전체</option>
              <option value="NORMAL">정상</option>
              <option value="INSPECTION">점검중</option>
              <option value="BROKEN">고장</option>
              <option value="DISPOSED">폐기</option>
            </select>
          </div>
          <div class="form-field"><label for="spaceName">공간</label><input id="spaceName"></div>
        </form>
        <div class="actions">
          <button id="resetBtn" class="btn" type="button">초기화</button>
          <button id="searchBtn" class="btn btn-primary" type="button">검색</button>
          <button id="addAssetBtn" class="btn btn-primary" type="button">자산 등록</button>
        </div>
      </section>
      <section class="panel">
        <div class="table-wrap"><table class="data-table">
          <thead>
            <tr>
              <th class="is-sortable" data-sort="assetCode">자산코드</th>
              <th class="is-sortable" data-sort="assetName">자산명</th>
              <th>유형</th>
              <th class="is-sortable" data-sort="status">상태</th>
              <th>공간</th>
              <th class="is-sortable" data-sort="updatedAt">등록/수정일</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="assetTableBody"></tbody></table>
        </div>
        <div id="assetPagination" class="pagination"></div>
      </section>
    </main>
  </div>
  <div id="assetModal" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header"><h2 id="assetModalTitle">자산 등록</h2><button class="btn" type="button" data-modal-close>닫기</button></div>
      <form id="assetForm">
        <div class="modal-body form-grid">
          <input type="hidden" name="id">
          <div class="form-field"><label>자산코드</label><input name="assetCode"><span class="field-error"></span></div>
          <div class="form-field"><label>자산명</label><input name="assetName"><span class="field-error"></span></div>
          <div class="form-field"><label>자산유형</label><input name="assetType"><span class="field-error"></span></div>
          <div class="form-field"><label>상태</label><select name="status"><option value="NORMAL">정상</option><option value="INSPECTION">점검중</option><option value="BROKEN">고장</option><option value="DISPOSED">폐기</option></select><span class="field-error"></span></div>
          <div class="form-field"><label>프로젝트</label><input name="projectName"></div>
          <div class="form-field"><label>건물</label><input name="buildingName"></div>
          <div class="form-field"><label>층</label><input name="floorName"></div>
          <div class="form-field"><label>공간</label><input name="spaceName"><span class="field-error"></span></div>
          <div class="form-field"><label>bimElementId</label><input name="bimElementId"></div>
          <div class="form-field"><label>설치일</label><input name="installedAt" type="date"></div>
          <input type="hidden" name="updatedAt">
        </div>
        <div class="modal-footer"><button class="btn" type="button" data-modal-close>취소</button><button class="btn btn-primary" type="submit">저장</button></div>
      </form>
    </div>
  </div>
  <script src="vendor/jquery-3.7.1.min.js"></script>
  <script src="js/storage.js"></script><script src="js/api.js"></script><script src="js/app.js"></script>
  <script src="js/validation.js"></script><script src="js/modal.js"></script><script src="js/table.js"></script>
  <script src="js/assets.js"></script>
</body>
</html>
